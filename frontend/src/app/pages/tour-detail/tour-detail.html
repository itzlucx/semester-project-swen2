@if (tour) {
    <div class="detail container">
        <h1> {{ tour.name }} </h1>
        <div class="info-box">
            <p><strong>Distanz:</strong> {{ tour.distance }}km </p>
            <p><strong>Dauer:</strong> {{ tour.estimatedTime }}h </p>
            <p><strong>Beschreibung:</strong> {{ tour.description }} </p>
        </div>
    </div>
    <div class="action-buttons">
        <div class="danger-zone">
            <button mat-raised-button color="accent" [routerLink]="['/tour/edit', tour.id]">Bearbeiten</button>
            <button mat-raised-button color="warn" (click)="onDelete()">Löschen</button>
        </div>
      <br>
        <div class="create-log">
          <button mat-raised-button color="accent" [routerLink]="['/tour', tour.id, 'new-log']">Tour-log erstellen</button>
        </div>
        <button mat-button routerLink="/home">Back</button>
    </div>
  <div class="tour-logs-list">
    <app-tour-log-list [tourId]="tour.id"></app-tour-log-list>
  </div>
} @else {
    <div class="error-container">
        <h1>Tour nicht gefunden!</h1>
        <p>Sorry, diese Tour existiert nicht.</p>
    </div>
}
