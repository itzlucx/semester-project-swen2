@if (tour) {
  <div class="detail-container">
    
    <header class="detail-header">
      <h1>{{ tour.name }}</h1>
      <button mat-button routerLink="/home">Zurück zur Liste</button>
    </header>

    <div class="map-placeholder">
      <span>🗺️ Map Placeholder</span>
    </div>

    <div class="info-box">
      <p><strong>Start: </strong>{{ tour.start }}</p>
      <p><strong>Destination: </strong>{{ tour.destination }}</p>
      <p><strong>Transport Type: </strong>{{ tour.transportType }}</p>
      <p><strong>Distance: </strong>? km</p>
      <p><strong>Duration: </strong>? h</p>
      <p><strong>Description: </strong>{{ tour.description }}</p>
    </div>

    <div class="action-buttons">
      <button mat-raised-button color="primary" [routerLink]="['/tour', tour.id, 'new-log']">
        + Tour-Log erstellen
      </button>

      <div class="danger-zone">
        <button mat-raised-button color="accent" [routerLink]="['/tour/edit', tour.id]">Bearbeiten</button>
        <button mat-raised-button color="warn" (click)="onDelete()">Löschen</button>
      </div>
    </div>

    <div class="tour-logs-section">
      <app-tour-log-list [tourId]="tour.id"></app-tour-log-list>
    </div>

  </div>
} @else {
  <div class="error-container">
    <h1>Tour nicht gefunden!</h1>
    <p>Sorry, diese Tour existiert nicht.</p>
    <button mat-raised-button color="primary" routerLink="/home">Zurück zur Startseite</button>
  </div>
}
